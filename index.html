<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe's Beauty Bar</title>

<style>

/* ===== BODY ===== */
body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
text-align:center;
color:#333;
}

/* ===== HEADER ===== */
header{
background:linear-gradient(90deg,#ff4b7d,#ff758c);
color:white;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

/* ===== HERO ===== */
.hero img{
width:100%;
max-height:250px;
object-fit:cover;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

/* ===== INPUTS ===== */
input{
padding:10px;
margin:5px;
width:220px;
border-radius:20px;
border:none;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

/* ===== GRID ===== */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
margin:10px;
padding:15px;
width:200px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* ===== BUTTON ===== */
button{
padding:10px;
margin-top:10px;
background:linear-gradient(45deg,#00c9ff,#92fe9d);
color:black;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* ===== TOTAL BOX ===== */
.total-box{
background:linear-gradient(90deg,#667eea,#764ba2);
color:white;
padding:20px;
margin:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* ===== GALLERY ===== */
.gallery img{
width:110px;
height:110px;
margin:8px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.1);
}

/* ===== POPUP ===== */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup img{
width:80%;
max-width:300px;
border-radius:15px;
}

/* ===== FOOTER ===== */
footer{
background:#222;
color:white;
padding:10px;
}

</style>
</head>

<body>

<header>
<h1>💖 Zoe's Beauty Bar</h1>
<p>✨ Beauty • Braids • Style ✨</p>
</header>

<!-- HERO -->
<div class="hero">
<img src="https://i.ibb.co/2jL9qWP/pricelist.jpg">
</div>

<!-- DETAILS -->
<h2>🌸 Your Details</h2>

<input id="name" placeholder="Your Name">
<br>
<input type="date" id="date">
<br>
<input type="time" id="time">

<!-- SERVICES -->
<h2>💇‍♀️ Choose Your Style</h2>

<div class="grid">

<div class="card">
<p>Straight Back Waist - R150</p>
<button onclick="add('Straight Back Waist',150)">Add</button>
</div>

<div class="card">
<p>Lemonade Back - R120</p>
<button onclick="add('Lemonade Back',120)">Add</button>
</div>

<div class="card">
<p>Cornrows - R70</p>
<button onclick="add('Cornrows',70)">Add</button>
</div>

<div class="card">
<p>Wash - R40</p>
<button onclick="add('Wash',40)">Add</button>
</div>

</div>

<!-- TOTAL -->
<div class="total-box">
<h3>🛍 Your Order</h3>
<p id="list"></p>
<h2>Total: R<span id="total">0</span></h2>

<button onclick="send()">💬 Book on WhatsApp</button>
</div>

<!-- GALLERY -->
<h2>📸 Gallery</h2>

<div class="gallery">
<img src="https://i.ibb.co/0V1McrL/hair1.jpg" onclick="show(this.src)">
<img src="https://i.ibb.co/2s6sG7J/hair2.jpg" onclick="show(this.src)">
<img src="https://i.ibb.co/GPk0xKk/hair3.jpg" onclick="show(this.src)">
</div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="hide()">
<img id="popup-img">
</div>

<footer>
<p>🌟 Zoe's Beauty Bar</p>
</footer>

<script>

let cart=[]
let total=0

function add(name,price){
cart.push(name+" - R"+price)
total+=price

document.getElementById("list").innerText=cart.join(", ")
document.getElementById("total").innerText=total
}

function send(){

let name=document.getElementById("name").value
let date=document.getElementById("date").value
let time=document.getElementById("time").value

if(!name || !date || !time){
alert("Please fill all details")
return
}

let phone="27713502434"

let message=
"Hi, I want to book:\n\n"+
"Name: "+name+"\n"+
"Date: "+date+"\n"+
"Time: "+time+"\n\n"+
cart.join("\n")+
"\n\nTotal: R"+total

let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message)

window.open(url,"_blank")

}

function show(src){
document.getElementById("popup").style.display="flex"
document.getElementById("popup-img").src=src
}

function hide(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
